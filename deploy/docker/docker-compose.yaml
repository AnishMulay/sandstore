services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: sandstore-etcd
    command:
      - /usr/local/bin/etcd
      - --name=etcd
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd=http://etcd:2380
      - --initial-cluster-state=new
    healthcheck:
      test: ["CMD-SHELL", "ETCDCTL_API=3 etcdctl --endpoints=http://127.0.0.1:2379 endpoint health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - sandstore-hyperconverged-net

  etcd-init:
    image: alpine:latest
    depends_on:
      etcd:
        condition: service_healthy
    environment:
      ETCD_CONTAINER: sandstore-etcd
      CLUSTER_NODES: sandstore-hyperconverged-1@sandstore-hyperconverged-1:8080,sandstore-hyperconverged-2@sandstore-hyperconverged-2:8080,sandstore-hyperconverged-3@sandstore-hyperconverged-3:8080
    volumes:
      - ../../scripts/dev/init-etcd.sh:/init-etcd.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache bash curl
        apk add --no-cache docker-cli
        chmod +x /init-etcd.sh
        /init-etcd.sh
    networks:
      - sandstore-hyperconverged-net

  sandstore-hyperconverged-1:
    image: sandstore-node:latest
    depends_on:
      etcd-init:
        condition: service_completed_successfully
    environment:
      ETCD_ENDPOINTS: etcd:2379
    command:
      - --server
      - node
      - --node-id
      - sandstore-hyperconverged-1
      - --listen
      - sandstore-hyperconverged-1:8080
      - --data-dir
      - /var/lib/sandstore/data
    volumes:
      - ../../run/sandstore-hyperconverged-1/data:/var/lib/sandstore/data
    networks:
      - sandstore-hyperconverged-net

  sandstore-hyperconverged-2:
    image: sandstore-node:latest
    depends_on:
      etcd-init:
        condition: service_completed_successfully
    environment:
      ETCD_ENDPOINTS: etcd:2379
    command:
      - --server
      - node
      - --node-id
      - sandstore-hyperconverged-2
      - --listen
      - sandstore-hyperconverged-2:8080
      - --data-dir
      - /var/lib/sandstore/data
    volumes:
      - ../../run/sandstore-hyperconverged-2/data:/var/lib/sandstore/data
    networks:
      - sandstore-hyperconverged-net

  sandstore-hyperconverged-3:
    image: sandstore-node:latest
    depends_on:
      etcd-init:
        condition: service_completed_successfully
    environment:
      ETCD_ENDPOINTS: etcd:2379
    command:
      - --server
      - node
      - --node-id
      - sandstore-hyperconverged-3
      - --listen
      - sandstore-hyperconverged-3:8080
      - --data-dir
      - /var/lib/sandstore/data
    volumes:
      - ../../run/sandstore-hyperconverged-3/data:/var/lib/sandstore/data
    networks:
      - sandstore-hyperconverged-net

  smoke-test:
    image: sandstore-node:latest
    depends_on:
      sandstore-hyperconverged-1:
        condition: service_started
      sandstore-hyperconverged-2:
        condition: service_started
      sandstore-hyperconverged-3:
        condition: service_started
    volumes:
      - ../../run/sandstore-hyperconverged-1/data/logs:/cluster-logs/sandstore-hyperconverged-1:ro
      - ../../run/sandstore-hyperconverged-2/data/logs:/cluster-logs/sandstore-hyperconverged-2:ro
      - ../../run/sandstore-hyperconverged-3/data/logs:/cluster-logs/sandstore-hyperconverged-3:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache netcat-openbsd

        until nc -z sandstore-hyperconverged-1 8080 && nc -z sandstore-hyperconverged-2 8080 && nc -z sandstore-hyperconverged-3 8080; do
          echo "Waiting for Sand Store nodes..."
          sleep 2
        done

        echo "Detecting current leader from node logs..."
        LEADER_ADDR=""
        for _ in $$(seq 1 60); do
          for NODE in sandstore-hyperconverged-1 sandstore-hyperconverged-2 sandstore-hyperconverged-3; do
            LOG_FILE="/cluster-logs/$${NODE}/$${NODE}.log"
            if [ -f "$$LOG_FILE" ] && grep -q "Became Leader" "$$LOG_FILE"; then
              LEADER_ADDR="$${NODE}:8080"
              break
            fi
          done

          if [ -n "$$LEADER_ADDR" ]; then
            break
          fi

          sleep 1
        done

        if [ -z "$$LEADER_ADDR" ]; then
          echo "Failed to discover leader from logs; defaulting to sandstore-hyperconverged-1:8080"
          LEADER_ADDR="sandstore-hyperconverged-1:8080"
        fi

        export SANDSTORE_ADDR="$$LEADER_ADDR"
        echo "Discovered leader: $$SANDSTORE_ADDR"

        exec /usr/local/bin/smoke
    networks:
      - sandstore-hyperconverged-net

networks:
  sandstore-hyperconverged-net:
    driver: bridge
