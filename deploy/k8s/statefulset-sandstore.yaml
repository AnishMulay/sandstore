apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sandstore-hyperconverged
  labels:
    app: sandstore-hyperconverged
    app.kubernetes.io/name: sandstore-hyperconverged
spec:
  serviceName: sandstore-hyperconverged-headless
  replicas: 3
  selector:
    matchLabels:
      app: sandstore-hyperconverged
      sandstore-role: node
  template:
    metadata:
      labels:
        app: sandstore-hyperconverged
        app.kubernetes.io/name: sandstore-hyperconverged
        sandstore-role: node
    spec:
      containers:
        - name: sandstore
          image: sandstore-node:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: raft
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 2112
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sandstore-hyperconverged-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: NODE_ID
              value: "$(POD_NAME)"
            - name: LISTEN_ADDR
              value: ":8080"
            - name: DATA_DIR
              value: /var/lib/sandstore/data
          readinessProbe:
            tcpSocket:
              port: raft
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: raft
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: sandstore-data
              mountPath: /var/lib/sandstore/data
  volumeClaimTemplates:
    - metadata:
        name: sandstore-data
        labels:
          app: sandstore-hyperconverged
          app.kubernetes.io/name: sandstore-hyperconverged
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: sandstore-hyperconverged-local-ssd
        resources:
          requests:
            storage: 20Gi
