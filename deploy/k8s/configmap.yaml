apiVersion: v1
kind: ConfigMap
metadata:
  name: sandstore-hyperconverged-config
  labels:
    app: sandstore-hyperconverged
    app.kubernetes.io/name: sandstore-hyperconverged
data:
  # Future Makefile PROFILE flows can override these values before apply.
  ETCD_ENDPOINTS: "etcd-cluster-0.etcd-cluster:2379,etcd-cluster-1.etcd-cluster:2379,etcd-cluster-2.etcd-cluster:2379"
  RAFT_ELECTION_TIMEOUT_MS: "300"
  RAFT_HEARTBEAT_TIMEOUT_MS: "100"
  RAFT_MAX_BATCH_SIZE: "64"
  RAFT_MAX_BATCH_WAIT_MS: "10"
  RAFT_SNAPSHOT_THRESHOLD_LOGS: "200"
