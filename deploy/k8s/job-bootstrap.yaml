apiVersion: batch/v1
kind: Job
metadata:
  name: sandstore-hyperconverged-bootstrap-config
  labels:
    app: sandstore-hyperconverged
    app.kubernetes.io/name: sandstore-hyperconverged
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: sandstore-hyperconverged
        app.kubernetes.io/name: sandstore-hyperconverged
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: quay.io/coreos/etcd:v3.5.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: sandstore-hyperconverged-config
          command:
            - /bin/sh
            - -ec
            - |
              export ETCDCTL_API=3
              ENDPOINTS="$(printf '%s' "${ETCD_ENDPOINTS}" | sed 's#\([^,][^,]*\)#http://\1#g')"

              etcdctl --endpoints="${ENDPOINTS}" del --prefix /sandstore/config/nodes/

              etcdctl --endpoints="${ENDPOINTS}" put /sandstore/config/nodes/sandstore-hyperconverged-0 \
                '{"id":"sandstore-hyperconverged-0","address":"sandstore-hyperconverged-0.sandstore-hyperconverged-headless:8080","role":"voter"}'
              etcdctl --endpoints="${ENDPOINTS}" put /sandstore/config/nodes/sandstore-hyperconverged-1 \
                '{"id":"sandstore-hyperconverged-1","address":"sandstore-hyperconverged-1.sandstore-hyperconverged-headless:8080","role":"voter"}'
              etcdctl --endpoints="${ENDPOINTS}" put /sandstore/config/nodes/sandstore-hyperconverged-2 \
                '{"id":"sandstore-hyperconverged-2","address":"sandstore-hyperconverged-2.sandstore-hyperconverged-headless:8080","role":"voter"}'
